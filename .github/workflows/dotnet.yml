name: .NET

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 10.0.x
    - name: Install tools
      run: |
        dotnet tool install --global coverlet.console
    - name: Restore
      run: dotnet restore ./src --verbosity m
    - name: Pack
      run: dotnet pack -c release ./src/System.Net.IPNetwork
    - name: Build
      run: dotnet build --no-restore -c release ./src/ConsoleApplication
    - name: Test with coverage
      run: |
        dotnet build ./src/TestProject/TestProject.csproj -c Debug
        coverlet src/TestProject/bin/Debug/net10.0/TestProject.dll \
          --target dotnet \
          --targetargs "src/TestProject/bin/Debug/net10.0/TestProject.dll" \
          --format lcov \
          --output coverage.lcov
    - name: Upload to Coveralls
      uses: coverallsapp/github-action@v2
      with:
        file: coverage.lcov
        format: lcov

  windows-net48:
    name: Test net48 (Windows)
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 10.0.x
    - name: Restore
      run: dotnet restore ./src --verbosity m
    - name: Build TestProject (net48)
      run: dotnet build ./src/TestProject/TestProject.csproj -c Debug -f net48 --no-restore
    - name: Run net48 tests against netstandard2.0 build
      run: dotnet test ./src/TestProject/TestProject.csproj -c Debug -f net48 --no-build --logger "console;verbosity=normal"
