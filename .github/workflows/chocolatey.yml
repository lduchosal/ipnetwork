name: Chocolatey

on:
  release:
    types: [published]

jobs:
  publish:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 10.0.x

    - name: Extract version from tag
      id: version
      shell: pwsh
      run: |
        $version = "${{ github.event.release.tag_name }}"
        echo "VERSION=$version" >> $env:GITHUB_OUTPUT

    - name: Publish application
      shell: pwsh
      run: |
        dotnet publish src/ConsoleApplication `
          --configuration Release `
          --runtime win-x64 `
          --self-contained false `
          --output chocolatey/output/publish `
          /p:Version=${{ steps.version.outputs.VERSION }}

    - name: Create release archive
      shell: pwsh
      run: |
        Compress-Archive -Path "chocolatey/output/publish/*" -DestinationPath "chocolatey/output/ipnetwork-win-x64.zip"

    - name: Upload zip to GitHub Release
      shell: pwsh
      run: |
        gh release upload "${{ github.event.release.tag_name }}" "chocolatey/output/ipnetwork-win-x64.zip" --clobber
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Build and push Chocolatey package
      shell: pwsh
      run: |
        $version = "${{ steps.version.outputs.VERSION }}"
        $zipPath = "chocolatey/output/ipnetwork-win-x64.zip"

        # Calculate checksum
        $checksum = (Get-FileHash -Path $zipPath -Algorithm SHA256).Hash

        # Update version, checksum in chocolateyinstall.ps1
        $installScript = Get-Content "chocolatey/tools/chocolateyinstall.ps1" -Raw
        $installScript = $installScript -replace 'XXX_VERSION_XXX', $version
        $installScript = $installScript -replace "checksum64\s*=\s*'.*'", "checksum64    = '$checksum'"
        Set-Content "chocolatey/tools/chocolateyinstall.ps1" $installScript

        # Update version in nuspec
        $nuspec = Get-Content "chocolatey/ipnetwork.nuspec" -Raw
        $nuspec = $nuspec -replace 'XXX_VERSION_XXX', $version
        Set-Content "chocolatey/ipnetwork.nuspec" $nuspec

        # Update version and checksum in VERIFICATION.txt
        $verification = Get-Content "chocolatey/tools/VERIFICATION.txt" -Raw
        $verification = $verification -replace 'XXX_VERSION_XXX', $version
        $verification = $verification -replace 'XXX_CHECKSUM_XXX', $checksum
        Set-Content "chocolatey/tools/VERIFICATION.txt" $verification

        # Pack and push
        Push-Location chocolatey
        choco pack
        choco push "ipnetwork.$version.nupkg" --source https://push.chocolatey.org/ --api-key ${{ secrets.CHOCOLATEY_API_KEY }}
        Pop-Location
